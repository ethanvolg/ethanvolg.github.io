baseURL = 'https://ethanvolg.github.io/'
languageCode = 'ko-kr'
title = 'ethanvolg | 보안 학습 노트'
theme = 'kong-htop'
paginate = 10
pluralizelistitles = false

[Author]
name = 'ethan'

[params]
title = 'ethanvolg | 보안 학습 노트'
brand = 'ethanvolg'
brand_image = '/images/ethan.png'
author = 'ethan'
github_url = 'https://github.com/ethanvolg'
og_image = 'images/ethan.png'
publisher_icon = '/images/favicon.png'
favicon = '/images/favicon.png'
description = '웹 해킹, 네트워크 보안, 모의해킹 등 보안 학습 내용을 기록하는 블로그입니다.'
dark_mode = true
mainSections = ['posts']
busuanzi_enable = false

menu = [
  { Name = 'About', URL = '/about/', HasChildren = false },
  { Name = 'Posts', URL = '/posts/', Pre = 'Recent', HasChildren = true, Limit = 5 },
  { Name = 'Categories', URL = '/categories/', HasChildren = false },
  { Name = 'Tags', URL = '/tags/', HasChildren = false },
]

rss_icon = true
rss_section = 'posts'

sidebar_bg_color = '#202020'
sidebar_img_border_color = '#515151'
sidebar_p_color = '#909090'
sidebar_h1_color = '#FFF'
sidebar_a_color = '#FFF'
sidebar_socials_color = '#FFF'
moon_sun_color = '#FFF'
moon_sun_background_color = '#515151'

text_color = '#222'
content_bg_color = '#FAF9F6'
post_title_color = '#303030'
list_color = '#5a5a5a'
link_color = '#16a34a'
accent_rgb = '22, 163, 74'
date_color = '#515151'
table_border_color = '#E5E5E5'
table_stripe_color = '#F9F9F9'
code_color = '#15803d'
code_background_color = '#E8F5E9'

text_color_dark = '#FFFFFF'
content_bg_color_dark = '#121212'
post_title_color_dark = '#DBE2E9'
list_color_dark = '#e0e0e0'
link_color_dark = '#4ade80'
accent_rgb_dark = '74, 222, 128'
date_color_dark = '#9a9a9a'
table_border_color_dark = '#515151'
table_stripe_color_dark = '#202020'
code_color_dark = '#86efac'
code_background_color_dark = '#1a2e1a'

[params.meta]
favicon = true

[taxonomies]
series = 'series'
tags = 'tags'
categories = 'categories'

[outputs]
home = ['HTML', 'RSS', 'JSON']
section = ['HTML']
page = ['HTML']

[outputFormats.SearchIndex]
mediaType = 'application/json'
baseName = 'index'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
