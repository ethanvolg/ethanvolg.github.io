<div class="sidebar-about">
    <a class="sidebar-profile" href="{{ .Site.BaseURL }}" aria-label="홈으로 이동">
        {{ if .Site.Params.brand_image }}
            <img src="{{ .Site.Params.brand_image }}" alt="brand image">
        {{ else }}
            <span class="sidebar-profile-emoji" aria-hidden="true">{{ .Site.Params.profile_emoji | default "👻" }}</span>
        {{ end }}
    </a>
    {{ if .Site.Params.brand }}
        <div class="brand">
            <h1>
                <a href="{{ .Site.BaseURL }}">{{ .Site.Params.brand }}</a>
            </h1>
        </div>
    {{ end }}
    <p class="lead">
    {{ with .Site.Params.description }}{{. | safeHTML}}{{end}}
    </p>
</div>
