<nav class="nav__list">
  <h3 class="nav__title">📂 Categories</h3>

  <ul class="nav__items">
    {% assign sorted = site.categories | sort %}
    {% for category in sorted %}
      <li>
        <a href="/categories/{{ category[0] | slugify }}/">
          <span class="nav__sub-title">
            {{ category[0] }} ({{ category[1].size }})
          </span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
